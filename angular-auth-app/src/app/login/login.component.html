<div style="max-width: 300px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; text-align: left;">
  <h2>Login</h2>
  <input type="email" [(ngModel)]="user.email" placeholder="Email" style="width: 100%; margin: 5px 0; padding: 8px; box-sizing: border-box;"><br>
  <input type="password" [(ngModel)]="user.password" placeholder="Password" style="width: 100%; margin: 5px 0; padding: 8px; box-sizing: border-box;"><br>
  <button (click)="onLogin()" style="width: 100%; padding: 8px; margin-top: 10px; background-color: #198754; color: white; border: none; cursor: pointer;">Login</button>
  <p *ngIf="errorMsg" style="color:red; text-align: center;">{{errorMsg}}</p>
  <p style="text-align: center; margin-top: 15px;"><a href="javascript:void(0)" (click)="goToRegister()">Create new account</a></p>
</div>
